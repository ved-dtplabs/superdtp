<head>

<title>SuperDTP — Workflow Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#07080f;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Space Grotesk',monospace;overflow:hidden}
  #bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1;width:min(98vw,960px);padding:12px}

  /* ── SVG animations ── */
  @keyframes dash-march  { to { stroke-dashoffset:-22 } }
  @keyframes ring-pulse  { 0%,100%{r:62;opacity:.18} 50%{r:84;opacity:0} }
  @keyframes ring-pulse2 { 0%,100%{r:46;opacity:.28} 50%{r:60;opacity:0} }
  @keyframes core-glow   { 0%,100%{opacity:.55} 50%{opacity:1} }
  @keyframes spin-cw     { to{transform:rotate(360deg)} }
  @keyframes spin-ccw    { to{transform:rotate(-360deg)} }
  @keyframes node-breathe{ 0%,100%{opacity:.7} 50%{opacity:1} }
  @keyframes file-scan   { 0%{transform:translateY(0);opacity:0} 8%{opacity:.7} 88%{opacity:.7} 100%{transform:translateY(58px);opacity:0} }
  @keyframes qa-tick     { 0%,60%{stroke-dashoffset:40} 100%{stroke-dashoffset:0} }

  .path-march  { animation:dash-march 1.4s linear infinite }
  .ring-a      { animation:ring-pulse  3.2s ease-in-out infinite }
  .ring-b      { animation:ring-pulse2 2.6s ease-in-out infinite; animation-delay:-.4s }
  .core-glow   { animation:core-glow  2s ease-in-out infinite }
  .spin-ring   { transform-box:fill-box; transform-origin:center; animation:spin-cw  14s linear infinite }
  .spin-ring-r { transform-box:fill-box; transform-origin:center; animation:spin-ccw  9s linear infinite }
  .lang-node   { animation:node-breathe 3s ease-in-out infinite }
  .file-scan-bar { animation:file-scan 3s ease-in-out infinite }
</style>
</head>

  <filter id="glow-gold" x="-40%" y="-40%" width="180%" height="180%">

    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>

  <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>

</defs>

<script>
// ── Three.js-inspired particle field ──────────────────
const cv = document.getElementById('bg-canvas');
const cx2 = cv.getContext('2d');
let pts = [], W, H;

const GOLD = '212,175,55', CYAN = '56,189,248';

function resize() {
  W = cv.width  = window.innerWidth;
  H = cv.height = window.innerHeight;
}

function mkPt() {
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - .5) * .35,
    vy: (Math.random() - .5) * .35,
    r:  Math.random() * 1.6 + .4,
    a:  Math.random() * .35 + .04,
    c:  Math.random() > .68 ? CYAN : GOLD
  };
}

function init() {
  pts = [];
  const n = Math.floor(W * H / 16000);
  for (let i = 0; i < n; i++) pts.push(mkPt());
}

let frame = 0;
function tick() {
  cx2.clearRect(0, 0, W, H);
  frame++;

  // vignette
  const vg = cx2.createRadialGradient(W/2, H/2, H*.1, W/2, H/2, H*.9);
  vg.addColorStop(0, 'transparent');
  vg.addColorStop(1, 'rgba(0,0,0,.55)');
  cx2.fillStyle = vg;
  cx2.fillRect(0, 0, W, H);

  // connections
  for (let i = 0; i < pts.length; i++) {
    for (let j = i+1; j < pts.length; j++) {
      const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
      const d  = Math.hypot(dx, dy);
      if (d < 110) {
        cx2.beginPath();
        cx2.moveTo(pts[i].x, pts[i].y);
        cx2.lineTo(pts[j].x, pts[j].y);
        cx2.strokeStyle = `rgba(${GOLD},${(1 - d/110) * .07})`;
        cx2.lineWidth = .5;
        cx2.stroke();
      }
    }
  }

  // dots
  for (const p of pts) {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;
    cx2.beginPath();
    cx2.arc(p.x, p.y, p.r, 0, Math.PI*2);
    cx2.fillStyle = `rgba(${p.c},${p.a})`;
    cx2.fill();
  }

  requestAnimationFrame(tick);
}

resize(); init(); tick();
window.addEventListener('resize', () => { resize(); init(); });
</script>
