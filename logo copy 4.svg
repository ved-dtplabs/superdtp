<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 132.31 44.26"
     class="logo">

  <defs>

    <radialGradient id="goldBlackGradient"
                    cx="50%"
                    cy="35%"
                    r="75%">

      <stop offset="0%" stop-color="#fff6cf"/>
      <stop offset="18%" stop-color="#f4d870"/>
      <stop offset="45%" stop-color="#d4af37"/>
      <stop offset="75%" stop-color="#8f7225"/>
      <stop offset="100%" stop-color="#0f0f0f"/>

    </radialGradient>

    <!-- Moving shine -->
    <linearGradient id="shine"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="0%">

      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="45%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,.9)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>

      <animateTransform
          attributeName="gradientTransform"
          type="translate"
          from="-150 0"
          to="150 0"
          dur="4s"
          repeatCount="indefinite"/>
    </linearGradient>

    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      svg.logo{
        overflow:visible;
        cursor:pointer;
      }

      .logo-group{
        transform-origin:center;
        transform-box:fill-box;
        transition:
          transform .45s cubic-bezier(.2,.8,.2,1),
          filter .45s ease;
      }

      svg:hover .logo-group{
        transform:scale(1.08);
      }

      .brand{
        fill:url(#goldBlackGradient);
        font-family:Impact,sans-serif;
        font-size:36px;
        filter:url(#goldGlow);
      }

      .domain{
        fill:url(#goldBlackGradient);
        font-family:Impact,sans-serif;
        font-size:15px;
      }

      .gold-line{
        fill:none;
        stroke:#24ce7f;
        stroke-width:1;
        stroke-dasharray:140;
        stroke-dashoffset:140;
        animation:drawLine 2s ease forwards;
      }

      .gold-dot{
        fill:#d4af37;
        animation:pulse 2.5s infinite;
      }

      .shine-overlay{
        fill:url(#shine);
        mix-blend-mode:screen;
        pointer-events:none;
      }

      @keyframes drawLine{
        to{
          stroke-dashoffset:0;
        }
      }

      @keyframes pulse{
        0%,100%{
          opacity:1;
          transform:scale(1);
          transform-origin:center;
        }
        50%{
          opacity:.6;
          transform:scale(1.4);
        }
      }
    </style>

  </defs>

  <g class="logo-group">

    <!-- Bottom Line -->
    <line class="gold-line"
          x1="0"
          y1="36.8"
          x2="127.7"
          y2="36.8"/>

    <!-- Vertical Divider -->
    <line class="gold-line"
          x1="10"
          y1="3"
          x2="10"
          y2="42.5"/>

    <!-- Brand -->
    <text class="brand"
          transform="translate(12 32.2) scale(.74 1)">
      SuperDTP
    </text>

    <!-- Shine Effect -->
    <rect class="shine-overlay"
          x="0"
          y="0"
          width="132.31"
          height="44.26"/>

    <!-- .com -->
    <text class="domain"
          transform="translate(127.2 31.5) rotate(-90)">
      co
    </text>

    <text class="domain"
          transform="translate(127.2 16.2) rotate(-90)">
      m
    </text>

    <!-- Dot -->
    <rect class="gold-dot"
          x="126.3"
          y="30.9"
          width="1.4"
          height="1.4"/>

  </g>

</svg>