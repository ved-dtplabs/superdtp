<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 132.31 44.26">

  <defs>

    <linearGradient id="goldBlackGradient"
                x1="0%"
                y1="0%"
                x2="0%"
                y2="100%">

    <stop offset="0%" stop-color="#8f7225"/>
    <stop offset="25%" stop-color="#d4af37"/>
    <stop offset="50%" stop-color="#f9e59f"/>
    <stop offset="75%" stop-color="#c8a43a"/>
    <stop offset="100%" stop-color="#755e1f"/>

</linearGradient>

    <style>
      .brand {
        fill: url(#goldBlackGradient);
        font-family: Impact, sans-serif;
        font-size: 36px;
      }

      .domain {
        fill: url(#goldBlackGradient);
        font-family: Impact, sans-serif;
        font-size: 15px;
      }

      .gold-line {
        fill: none;
        stroke: #d4af37;
        stroke-width: 1;
      }

      .gold-dot {
        fill: #d4af37;
      }
    </style>

  </defs>

  <!-- Bottom Line -->
  <line class="gold-line"
        x1="0"
        y1="36.8"
        x2="127.7"
        y2="36.8" />

  <!-- Left Vertical Divider -->
  <line class="gold-line"
        x1="10"
        y1="3"
        x2="10"
        y2="42.5" />

  <!-- .com -->
  <text class="domain"
        transform="translate(127.2 31.5) rotate(-90)">
    co
  </text>

  <text class="domain"
        transform="translate(127.2 16.2) rotate(-90)">
    m
  </text>

  <!-- Dot -->
  <rect class="gold-dot"
        x="126.3"
        y="30.9"
        width="1.4"
        height="1.4" />

  <!-- Brand Name -->
  <text class="brand"
        transform="translate(12 32.2) scale(.74 1)">
    SuperDTP

</svg>
