<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1920"
     height="1080"
     viewBox="0 0 1920 1080">

<defs>

    <!-- GOLD TEXT -->
    <linearGradient id="goldTextGradient"
                    x1="0%"
                    y1="0%"
                    x2="0%"
                    y2="100%">

        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="8%" stop-color="#fffef5"/>
        <stop offset="18%" stop-color="#fff4c7"/>
        <stop offset="35%" stop-color="#f8dc7a"/>
        <stop offset="50%" stop-color="#d4af37"/>
        <stop offset="70%" stop-color="#a8821c"/>
        <stop offset="100%" stop-color="#4a3500"/>

    </linearGradient>

    <!-- ANIMATED GOLD -->
    <linearGradient id="goldAnimated"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="0%">

        <stop offset="0%" stop-color="#d4af37"/>
        <stop offset="40%" stop-color="#f4d870"/>
        <stop offset="48%" stop-color="#fff6cf"/>
        <stop offset="50%" stop-color="#ffffff"/>
        <stop offset="52%" stop-color="#fff6cf"/>
        <stop offset="60%" stop-color="#f4d870"/>
        <stop offset="100%" stop-color="#d4af37"/>

        <animateTransform
            attributeName="gradientTransform"
            type="translate"
            from="-400 0"
            to="400 0"
            dur="3s"
            repeatCount="indefinite"/>

    </linearGradient>

    <!-- ELECTRIC CONNECTORS -->
    <linearGradient id="electricGold"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="0%">

        <stop offset="0%" stop-color="#fff6cf"/>
        <stop offset="20%" stop-color="#f4d870"/>
        <stop offset="50%" stop-color="#d4af37"/>
        <stop offset="80%" stop-color="#f4d870"/>
        <stop offset="100%" stop-color="#fff6cf"/>

        <animateTransform
            attributeName="gradientTransform"
            type="translate"
            from="-800 0"
            to="800 0"
            dur="2s"
            repeatCount="indefinite"/>

    </linearGradient>

    <!-- TEXT GLOW -->
    <filter id="goldTextGlow"
            x="-100%"
            y="-100%"
            width="300%"
            height="300%">

        <feGaussianBlur in="SourceGraphic"
                        stdDeviation="3"
                        result="blur1"/>

        <feGaussianBlur in="SourceGraphic"
                        stdDeviation="8"
                        result="blur2"/>

        <feGaussianBlur in="SourceGraphic"
                        stdDeviation="14"
                        result="blur3"/>

        <feMerge>
            <feMergeNode in="blur3"/>
            <feMergeNode in="blur2"/>
            <feMergeNode in="blur1"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>

    </filter>

    <!-- CONNECTOR GLOW -->
    <filter id="electricGlow"
            x="-100%"
            y="-100%"
            width="300%"
            height="300%">

        <feGaussianBlur stdDeviation="6"
                        result="glow"/>

        <feMerge>
            <feMergeNode in="glow"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>

    </filter>

    <style>

        .card{
            fill:#070707;
            stroke:#d4af37;
            stroke-width:3;
        }

        .gold{
            fill:url(#goldTextGradient);
            filter:url(#goldTextGlow);
        }

        .goldAnimated{
            fill:url(#goldAnimated);
            filter:url(#goldTextGlow);
        }

        .connector{
            stroke:url(#electricGold);
            stroke-width:4;
            fill:none;
            filter:url(#electricGlow);
            stroke-linecap:round;
        }

        .white{
            fill:white;
        }

        .label{
            font-family:Arial, Helvetica, sans-serif;
            font-size:22px;
            font-weight:700;
        }

    </style>

</defs>

<!-- BACKGROUND -->

<rect width="100%"
      height="100%"
      fill="#050505"/>

<!-- TITLE -->

<text x="960"
      y="210"
      text-anchor="middle"
      class="gold"
      font-size="34">

    END TO END LOCALISATION PIPELINE

</text>

<!-- HUB -->

<circle cx="960"
        cy="920"
        r="145"
        fill="#111"
        stroke="#d4af37"
        stroke-width="4"
        filter="url(#electricGlow)"/>

<text x="960"
      y="945"
      text-anchor="middle"
      class="gold"
      font-size="40"
      font-weight="700">

    SuperDTP Labs

</text>

<!-- CONNECTORS -->

<path d="M190 700 C250 760,500 780,960 776" class="connector"/>
<path d="M500 700 C550 760,700 780,960 776" class="connector"/>
<path d="M820 700 C850 760,900 780,960 776" class="connector"/>
<path d="M1100 700 C1070 760,1020 780,960 776" class="connector"/>
<path d="M1420 700 C1370 760,1220 780,960 776" class="connector"/>
<path d="M1740 700 C1670 760,1420 780,960 776" class="connector"/>

<!-- CARD 01 -->

<g>
    <rect x="70" y="300" width="240" height="420" rx="30" class="card"/>
    <circle cx="190" cy="300" r="30" class="card"/>
    <text x="190" y="312" text-anchor="middle" class="goldAnimated" font-size="26">01</text>
    <text x="190" y="420" text-anchor="middle" class="white label">SOURCE</text>
    <text x="190" y="450" text-anchor="middle" class="white label">INGESTION</text>
</g>

<!-- CARD 02 -->

<g>
    <rect x="390" y="300" width="240" height="420" rx="30" class="card"/>
    <circle cx="510" cy="300" r="30" class="card"/>
    <text x="510" y="312" text-anchor="middle" class="goldAnimated" font-size="26">02</text>
    <text x="510" y="435" text-anchor="middle" class="white label">LINGUISTIC</text>
    <text x="510" y="465" text-anchor="middle" class="white label">REVIEW</text>
</g>

<!-- CARD 03 -->

<g>
    <rect x="710" y="300" width="240" height="420" rx="30" class="card"/>
    <circle cx="830" cy="300" r="30" class="card"/>
    <text x="830" y="312" text-anchor="middle" class="goldAnimated" font-size="26">03</text>
    <text x="830" y="435" text-anchor="middle" class="white label">TERMINOLOGY</text>
    <text x="830" y="465" text-anchor="middle" class="white label">VALIDATION</text>
</g>

<!-- CARD 04 -->

<g>
    <rect x="1030" y="300" width="240" height="420" rx="30" class="card"/>
    <circle cx="1150" cy="300" r="30" class="card"/>
    <text x="1150" y="312" text-anchor="middle" class="goldAnimated" font-size="26">04</text>
    <text x="1150" y="435" text-anchor="middle" class="white label">DTP</text>
    <text x="1150" y="465" text-anchor="middle" class="white label">REFLOW</text>
</g>

<!-- CARD 05 -->

<g>
    <rect x="1350" y="300" width="240" height="420" rx="30" class="card"/>
    <circle cx="1470" cy="300" r="30" class="card"/>
    <text x="1470" y="312" text-anchor="middle" class="goldAnimated" font-size="26">05</text>
    <text x="1470" y="435" text-anchor="middle" class="white label">QA</text>
    <text x="1470" y="465" text-anchor="middle" class="white label">AUDIT</text>
</g>

<!-- CARD 06 -->

<g>
    <rect x="1670" y="300" width="200" height="420" rx="30" class="card"/>
    <circle cx="1770" cy="300" r="30" class="card"/>
    <text x="1770" y="312" text-anchor="middle" class="goldAnimated" font-size="26">06</text>
    <text x="1770" y="435" text-anchor="middle" class="white label">PRODUCTION</text>
    <text x="1770" y="465" text-anchor="middle" class="white label">DELIVERY</text>
</g>

</svg>