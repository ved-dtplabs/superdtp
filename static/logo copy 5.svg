<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="160" height="52"
     viewBox="0 0 160 52"
     preserveAspectRatio="xMinYMid meet">

  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37">
        <animate attributeName="offset" values="-1;1" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#fff8d8">
        <animate attributeName="offset" values="0;2" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#92824c">
        <animate attributeName="offset" values="1;3" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- Left vertical accent -->
  <line x1="9" y1="4" x2="9" y2="44"
        stroke="#d4af37" stroke-width="1" fill="none"/>

  <!-- Bottom baseline rule -->
  <line x1="0" y1="41" x2="150" y2="41"
        stroke="#d4af37" stroke-width="0.8" fill="none"/>

  <!-- Brand wordmark -->
  <text fill="url(#g)"
        font-family="Impact, sans-serif"
        font-size="38"
        transform="translate(14 37) scale(0.76 1)">SuperDTP</text>

</svg>
