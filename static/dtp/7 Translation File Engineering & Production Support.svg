<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220" role="img" aria-labelledby="title desc">
  <title id="title">Translation File Engineering &amp; Production Support</title>
  <desc id="desc">
    Animated document with a rotating gear, localization globe, workflow dots,
    and a confirmation checkmark.
  </desc>

  <!-- Workflow path -->
  <path id="flow"
        d="M82 82 C115 70 145 92 162 122"
        fill="none"
        stroke="#CBD5E1"
        stroke-width="2"
        stroke-dasharray="4 5"/>

  <!-- Moving workflow dots -->
  <circle r="3" fill="#14B8A6">
    <animateMotion dur="4s" repeatCount="indefinite">
      <mpath href="#flow"/>
    </animateMotion>
  </circle>

  <circle r="3" fill="#2563EB">
    <animateMotion dur="4s" begin="2s" repeatCount="indefinite">
      <mpath href="#flow"/>
    </animateMotion>
  </circle>

  <!-- Floating document -->
  <g>
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0;0 -3;0 0"
      dur="4s"
      repeatCount="indefinite"/>

    <rect x="40" y="40" width="90" height="120" rx="10"
          fill="#FFFFFF"
          stroke="#2563EB"
          stroke-width="2"/>

    <line x1="58" y1="68" x2="112" y2="68"
          stroke="#94A3B8" stroke-width="2"/>

    <line x1="58" y1="86" x2="102" y2="86"
          stroke="#94A3B8" stroke-width="2"/>

    <line x1="58" y1="104" x2="96" y2="104"
          stroke="#94A3B8" stroke-width="2"/>
  </g>


  <!-- Globe -->
  <g transform="translate(162 122)">
    <circle cx="0" cy="0" r="18"
            fill="#EFF6FF"
            stroke="#2563EB"
            stroke-width="2"/>

    <ellipse cx="0" cy="0" rx="7" ry="18"
             fill="none"
             stroke="#2563EB"
             stroke-width="1.5"/>

    <line x1="-18" y1="0" x2="18" y2="0"
          stroke="#2563EB"
          stroke-width="1.5"/>

    <path d="M-15 -7 H15 M-15 7 H15"
          fill="none"
          stroke="#2563EB"
          stroke-width="1.5"/>
  </g>

  <!-- Animated check -->
  <g opacity="0">
    <animate attributeName="opacity"
             values="0;1;1;0"
             dur="3s"
             repeatCount="indefinite"/>

    <circle cx="168" cy="164" r="15"
            fill="#14B8A6"/>

    <path d="M161 164l5 5 9-10"
          fill="none"
          stroke="#fff"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
</svg>